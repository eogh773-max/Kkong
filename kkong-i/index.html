<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>꽁이가 보낸 편지</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="clouds-container">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="cloud cloud-4"></div>
    </div>

    <div class="container">
        <h1>하늘나라 무지개 동산에서</h1>
        <div class="photo-frame">
            <img src="/img/kkong_1.jpg" alt="우리 꽁이 사진" class="pet-image">
        </div>
        <div class="letter-content" id="typewriter" style="display: none;"></div>
        <div class="footer" id="signature" style="display: none;">
            사랑을 듬뿍 담아,<br>꼬리 흔들며 기다릴게!
        </div>
        <button id="btn-play" onclick="startLetter()">편지 읽어보기</button>
    </div>

    <audio id="bgm" src="/music/inMyDream.mp3" autoplay loop></audio>

    <script src="/js/script.js"></script>
</body>
</html>
